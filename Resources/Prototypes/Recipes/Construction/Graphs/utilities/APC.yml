- type: constructionGraph
  id: APC
  start: start
  graph:
  - node: start
    edges:
    - to: apc-frame
      steps:
      - material: Steel
        amount: 3
        doAfter: 2
  
  - node: apc-frame
    entity: APCFrame
    actions: 
    - !type:AppearanceChange
    edges:
    - to: start
      steps:
      - tool: Screwing
        doAfter: 2
      completed:
      - !type:GivePrototype
        prototype: SheetSteel1
        amount: 3
      - !type:DeleteEntity {}

    - to: apc-cable-lv
      steps:
      - material: Cable
        amount: 2
        doAfter: 1
      completed:
      - !type:PlaySound
        sound: /Audio/Machines/id_insert.ogg
    - to: apc-cable-mv
      steps:
      - material: CableMV
        amount: 2
        doAfter: 1
      completed:
      - !type:PlaySound
        sound: /Audio/Machines/id_insert.ogg
    - to: apc-cable-hv
      steps:
      - material: CableHV
        amount: 2
        doAfter: 1
      completed:
      - !type:PlaySound
        sound: /Audio/Machines/id_insert.ogg

  ### LV APC (Standard APC) ###
  - node: apc-cable-lv
    entity: APCFrame
    actions:
    - !type:AppearanceChange
    edges:
    - to: apc-frame
      steps:
      - tool: Cutting
        doAfter: 1
      completed:
      - !type:GivePrototype
        prototype: CableApcStack1
        amount: 2
      - !type:PlaySound
        sound: /Audio/Items/wirecutter.ogg

    - to: apc-lv-board
      steps:
      - tag: ApcElectronics
        store: board
        name: construction-graph-component-apc-electronics
        icon:
          sprite: Objects/Misc/module.rsi
          state: charger_APC
        doAfter: 2

  - node: apc-lv-board
    entity: APCFrame
    actions:
    - !type:AppearanceChange
    edges:
    - to: apc-cable-lv
      steps:
      - tool: Prying
        doAfter: 1
      completed:
      - !type:EmptyContainer
        container: board
        pickup: true
      - !type:PlaySound
        sound: /Audio/Items/crowbar.ogg
    
    - to: apc-lv-cell-ready
      steps:
      - tool: Screwing
        doAfter: 2
      completed:
      - !type:PlaySound
        sound: /Audio/Machines/screwdriveropen.ogg
    
  - node: apc-lv-cell-ready
    entity: APCFrame
    actions:
    - !type:AppearanceChange
    edges:
    - to: apc-lv-board
      steps:
      - tool: Screwing
        doAfter: 2
      completed:
      - !type:PlaySound
        sound: /Audio/Machines/screwdriverclose.ogg
    
    - to: apc-standard-open
      steps:
      - tag: PowerCellSmall
        store: powercell
        name: construction-graph-component-power-cell
        icon:
          sprite: Objects/Power/power_cells.rsi
          state: small
        doAfter: 2

  # STANDARD APC #
  - node: apc-standard-open
    entity: APCFrame
    actions:
    - !type:AppearanceChange
    edges:
    - to: apc-lv-cell-ready
      steps:
      - tool: Prying
        doAfter: 1
      completed:
      - !type:EmptyContainer
        container: powercell
        pickup: true
      - !type:PlaySound
        sound: /Audio/Items/crowbar.ogg

    - to: apc-standard
      steps:
      - tool: Screwing
        doAfter: 1
      completed:
      - !type:PlaySound
        sound: /Audio/Machines/screwdriverclose.ogg
  
  - node: apc-standard
    entity: APCConstructed
    edges:
    - to: apc-lv-cell-ready
      steps:
      - tool: Prying
        doAfter: 1
      conditions:
      - !type:WirePanel
        open: true
      completed:
      - !type:EmptyContainer
        container: powercell
        pickup: true
      - !type:PlaySound
        sound: /Audio/Items/crowbar.ogg

